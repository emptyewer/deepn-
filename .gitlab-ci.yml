image:
  name: venkykrishna/deepn:latest
  entrypoint: ["bash", "/entrypoint.sh"]

stages:
   - linux-win-build
   - release

linux-win-build:
   stage: linux-win-build
   script:
      -  docker run venkykrishna/deepn:latest
   artifacts:
      paths:
         - /builds/emptyewer/deepn-plus/deepn++_linux_64bit.7z
         - /builds/emptyewer/deepn-plus/deepn++_windows_64bit.7z
      expire_in: never


release:
   image: registry.gitlab.com/gitlab-automation-toolkit/gitlab-auto-release
   stage: release
   dependencies:
      - linux-win-build
   before_script: []
   script:
      - gitlab_auto_release --changelog CHANGELOG.md --artifacts linux-win-build
