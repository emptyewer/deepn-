stages:
   - base
   - docker
   - build
   - publish

base-docker:
   stage: base
   tags:
      - linux
      - dedicated
   only:
      changes:
        - docker/linux/base/Dockerfile
   script:
      - docker login -u $CI_DEPLOY_USER -p $CI_DEPLOY_PASSWORD $CI_REGISTRY
      - docker build . --rm --no-cache -t $CI_REGISTRY/emptyewer/deepn-plus/base:latest -f $CI_PROJECT_DIR/docker/linux/base/Dockerfile
      - docker push $CI_REGISTRY/emptyewer/deepn-plus/base:latest

linux-docker:
   stage: docker
   tags:
      - linux
      - dedicated
   only:
      changes:
        - docker/linux/base/Dockerfile
        - docker/linux/Dockerfile
        - docker/linux/default
        - docker/linux/entrypoint.sh
   dependencies:
     - base-docker
   script:
      - docker login -u $CI_DEPLOY_USER -p $CI_DEPLOY_PASSWORD $CI_REGISTRY
      - CI_PROJECT_DIR=$CI_PROJECT_DIR docker build . --rm --no-cache -t $CI_REGISTRY/emptyewer/deepn-plus/linux64:latest -f $CI_PROJECT_DIR/docker/linux/Dockerfile
      - docker push $CI_REGISTRY/emptyewer/deepn-plus/linux64:latest

windows-docker:
   stage: docker
   tags:
      - linux
      - dedicated
   only:
      changes:
        - docker/windows/Dockerfile
        - docker/windows/default
        - docker/windows/entrypoint.sh
   script:
      - docker login -u $CI_DEPLOY_USER -p $CI_DEPLOY_PASSWORD $CI_REGISTRY
      - CI_PROJECT_DIR=$CI_PROJECT_DIR docker build . --rm --no-cache -t $CI_REGISTRY/emptyewer/deepn-plus/windows64:latest -f $CI_PROJECT_DIR/docker/windows/Dockerfile
      - docker push $CI_REGISTRY/emptyewer/deepn-plus/windows64:latest

linux-build:
   stage: build
   image: emptyewer/deepn-plus/linux64:latest
   before_script: []
   script:
      -  docker login -u $CI_DEPLOY_USER -p $CI_DEPLOY_PASSWORD $CI_REGISTRY
      -  CI_PROJECT_DIR=$CI_PROJECT_DIR docker run $CI_REGISTRY/emptyewer/deepn-plus/linux64:latest
   dependencies:
      - linux-docker
   artifacts:
      paths:
         - $CI_PROJECT_DIR/deepn++_linux_64bit.7z
      expire_in: '1 hour'

windows-build:
   stage: build
   image: emptyewer/deepn-plus/windows64:latest
   before_script: []
   script:
      - docker login -u $CI_DEPLOY_USER -p $CI_DEPLOY_PASSWORD $CI_REGISTRY
      - CI_PROJECT_DIR=$CI_PROJECT_DIR docker run $CI_REGISTRY/emptyewer/deepn-plus/windows64:latest
   dependencies:
      - windows-docker
   artifacts:
      paths:
         - $CI_PROJECT_DIR/deepn++_windows_64bit.7z
      expire_in: '1 hour'

publish:
   image: venkykrishna/gitlab-release
   stage: publish
   dependencies:
      - linux-build
      - windows-build
   before_script: []
   script:
        - gitlab-release --message "Latest Release ($(date))" $CI_PROJECT_DIR/deepn++_linux_64bit.7z $CI_PROJECT_DIR/deepn++_windows_64bit.7z
