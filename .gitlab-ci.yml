stages:
   - build
   - publish

linux-build:
   stage: build
   image: venkykrishna/linux64:latest
   script:
      -  docker run venkykrishna/linux64:latest
   artifacts:
      paths:
         - /builds/emptyewer/deepn-plus/deepn++_linux_64bit.7z
      expire_in: '1 hour'

windows-build:
   stage: build
   image: venkykrishna/windows64:latest
   script:
      -  docker run venkykrishna/windows64:latest
   artifacts:
      paths:
         - /builds/emptyewer/deepn-plus/deepn++_windows_64bit.7z
      expire_in: '1 hour'

publish:
   image: inetprocess/gitlab-release
   stage: publish
   dependencies:
      - build
   before_script: []
   script:
        - gitlab-release --message "Latest Release ($(date))" /builds/emptyewer/deepn-plus/deepn++_linux_64bit.7z /builds/emptyewer/deepn-plus/deepn++_windows_64bit.7z
