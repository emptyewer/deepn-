stages:
   - docker
   - build
   - publish

variables:
  DOCKER_HOST: tcp://docker:2375/
  DOCKER_DRIVER: overlay2

base-docker:
   stage: docker
   image: docker:latest
   services:
     - docker:dind
   only:
      changes:
        - docker/linux/base/Dockerfile
   script:
      - docker login -u $CI_DEPLOY_USER -p $CI_DEPLOY_PASSWORD $CI_REGISTRY
      - docker build . --rm --no-cache -t $CI_REGISTRY/emptyewer/deepn-plus/base:latest -f docker/linux/base/Dockerfile
      - docker push $CI_REGISTRY/emptyewer/deepn-plus/base:latest

linux-docker:
   stage: docker
   image: docker:latest
   services:
     - docker:dind
   only:
      changes:
        - docker/linux/Dockerfile
        - docker/linux/default
        - docker/linux/entrypoint.sh
   dependencies:
     - base-docker
   script:
      - docker login -u $CI_DEPLOY_USER -p $CI_DEPLOY_PASSWORD $CI_REGISTRY
      - docker build . --rm --no-cache -t $CI_REGISTRY/emptyewer/deepn-plus/linux64:latest -f docker/linux/Dockerfile
      - docker push $CI_REGISTRY/emptyewer/deepn-plus/linux64:latest

windows-docker:
   stage: docker
   image: docker:latest
   services:
     - docker:dind
   only:
      changes:
        - docker/windows/Dockerfile
        - docker/windows/default
        - docker/windows/entrypoint.sh
   script:
      - docker login -u $CI_DEPLOY_USER -p $CI_DEPLOY_PASSWORD $CI_REGISTRY
      - docker build . --rm --no-cache -t $CI_REGISTRY/emptyewer/deepn-plus/windows64:latest -f docker/windows/Dockerfile
      - docker push $CI_REGISTRY/emptyewer/deepn-plus/windows64:latest

linux-build:
   stage: build
   image: $CI_REGISTRY/emptyewer/deepn-plus/linux64:latest
   script:
      -  docker run $CI_REGISTRY/emptyewer/deepn-plus/linux64:latest
   dependencies:
     - linux-docker
   artifacts:
      paths:
         - /builds/emptyewer/deepn-plus/deepn++_linux_64bit.7z
      expire_in: '1 hour'

windows-build:
   stage: build
   image: $CI_REGISTRY/emptyewer/deepn-plus/windows64:latest
   script:
      -  docker run $CI_REGISTRY/emptyewer/deepn-plus/windows64:latest
   dependencies:
      - windows-docker
   artifacts:
      paths:
         - /builds/emptyewer/deepn-plus/deepn++_windows_64bit.7z
      expire_in: '1 hour'

publish:
   image: venkykrishna/gitlab-release
   stage: publish
   dependencies:
      - linux-build
      - windows-build
   before_script: []
   script:
        - gitlab-release --message "Latest Release ($(date))" /builds/emptyewer/deepn-plus/deepn++_linux_64bit.7z /builds/emptyewer/deepn-plus/deepn++_windows_64bit.7z
