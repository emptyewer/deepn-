stages:
   - base
   - docker
   - build
   - publish

base-docker:
   stage: base
   tags:
      - linux
      - dedicated
   only:
      changes:
        - docker/linux/base/Dockerfile
   variables:
      IMAGE: $CI_REGISTRY/emptyewer/deepn-plus/base:latest
   script:
      - docker image inspect $IMAGE >/dev/null 2>&1 && docker rmi $IMAGE || echo "$IMAGE not present, skipping"
      - docker login -u $CI_DEPLOY_USER -p $CI_DEPLOY_PASSWORD $CI_REGISTRY
      - docker build . --rm --no-cache -t $IMAGE -f $CI_PROJECT_DIR/docker/linux/base/Dockerfile
      - docker push $IMAGE

linux-docker:
   stage: docker
   tags:
      - linux
      - dedicated
   variables:
      IMAGE: $CI_REGISTRY/emptyewer/deepn-plus/linux64:latest
   only:
      changes:
        - docker/linux/base/Dockerfile
        - docker/linux/Dockerfile
        - docker/linux/default
        - docker/linux/entrypoint.sh
   dependencies:
     - base-docker
   script:
      - docker image inspect $IMAGE >/dev/null 2>&1 && docker rmi $IMAGE || echo "$IMAGE not present, skipping"
      - docker login -u $CI_DEPLOY_USER -p $CI_DEPLOY_PASSWORD $CI_REGISTRY
      - docker build . --rm --no-cache -t $IMAGE -f $CI_PROJECT_DIR/docker/linux/Dockerfile
      - docker push $IMAGE

windows-docker:
   stage: docker
   tags:
      - linux
      - dedicated
   variables:
      IMAGE: $CI_REGISTRY/emptyewer/deepn-plus/windows64:latest
   only:
      changes:
        - docker/windows/Dockerfile
        - docker/windows/default
        - docker/windows/entrypoint.sh
   script:
      - docker image inspect $IMAGE >/dev/null 2>&1 && docker rmi $IMAGE || echo "$IMAGE not present, skipping"
      - docker login -u $CI_DEPLOY_USER -p $CI_DEPLOY_PASSWORD $CI_REGISTRY
      - docker build . --rm --no-cache -t $IMAGE -f $CI_PROJECT_DIR/docker/windows/Dockerfile
      - docker push $IMAGE

mac-build:
   stage: build
   tags:
      - dedicated
      - mac
      - catalina
   script:
      - cd $CI_PROJECT_DIR
      - cmake -DCMAKE_BUILD_TYPE=Release -S $CI_PROJECT_DIR -B $CI_PROJECT_DIR/build_mac_release
      - make -j4 -C $CI_PROJECT_DIR/build_mac_release GeneCount++
      - make -j4 -C $CI_PROJECT_DIR/build_mac_release JunctionMake++
      - make -j4 -C $CI_PROJECT_DIR/build_mac_release DEEPN++
   artifacts:
      paths:
         - $CI_PROJECT_DIR/deepn++_mac_64bit.7z
      expire_in: '1 hour'

linux-build:
   stage: build
   image: $CI_REGISTRY/emptyewer/deepn-plus/linux64:latest
   before_script: []
   script:
      -  docker login -u $CI_DEPLOY_USER -p $CI_DEPLOY_PASSWORD $CI_REGISTRY
      -  docker run $CI_REGISTRY/emptyewer/deepn-plus/linux64:latest
   dependencies:
      - linux-docker
   artifacts:
      paths:
         - $CI_PROJECT_DIR/deepn++_linux_64bit.7z
      expire_in: '1 hour'

windows-build:
   stage: build
   image: $CI_REGISTRY/emptyewer/deepn-plus/windows64:latest
   before_script: []
   script:
      - docker login -u $CI_DEPLOY_USER -p $CI_DEPLOY_PASSWORD $CI_REGISTRY
      - docker run $CI_REGISTRY/emptyewer/deepn-plus/windows64:latest
   dependencies:
      - windows-docker
   artifacts:
      paths:
         - $CI_PROJECT_DIR/deepn++_windows_64bit.7z
      expire_in: '1 hour'

publish:
   image: venkykrishna/gitlab-release
   stage: publish
   dependencies:
      - linux-build
      - windows-build
   before_script: []
   script:
        - gitlab-release --message "Latest Release ($(date))" $CI_PROJECT_DIR/deepn++_linux_64bit.7z $CI_PROJECT_DIR/deepn++_windows_64bit.7z $CI_PROJECT_DIR/deepn++_mac_64bit.7z
